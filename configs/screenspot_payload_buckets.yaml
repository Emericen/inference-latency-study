experiment_name: screenspot_payload_buckets

defaults:
  scenario_id: screenspot_payload_buckets
  backend: openai_compat
  base_url: http://localhost:8000/v1
  api_key_env: ""
  token_budget_model: Qwen/Qwen3-VL-4B-Instruct
  max_completion_tokens: 10
  local_files_only: false
  warmups: 2
  runs: 10
  seed: 1337
  arch_type: dense
  precision: bf16
  server_mode: stateless
  client_mode: remote
  region: remote
  gpu_type: unknown
  gpu_count: 1
  tp_size: 1

cases:
  - case_id: screenspot_128kb
    model: Qwen/Qwen3-VL-8B-Instruct
    payload:
      kind: prepared_image_text
      question: What do you see in this image?
      target_prompt_tokens: 0
      cache_mode: unique
      image_count: 1
      target_image_bytes: 131072
      prepared_manifest_path: data/prepared/screenspot_payload_buckets/manifest.json
      screenspot_repo_id: lscpku/ScreenSpot
      screenspot_parquet_path: data/test-00000-of-00002.parquet

