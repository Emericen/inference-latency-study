experiment_name: modality_matched_prompt_budget

defaults:
  scenario_id: modality
  backend: openai_compat
  base_url: http://localhost:8000/v1
  api_key_env: ""
  token_budget_model: Qwen/Qwen3-VL-4B-Instruct
  max_completion_tokens: 10
  local_files_only: true
  warmups: 3
  runs: 30
  seed: 1337
  arch_type: dense
  precision: bf16
  server_mode: stateless
  client_mode: local
  region: local
  gpu_type: unknown
  gpu_count: 1
  tp_size: 1

cases:
  - case_id: text_only_961
    model: Qwen/Qwen3-VL-8B-Instruct
    payload:
      kind: text_only
      question: What is the main topic of this text?
      target_prompt_tokens: 961
      cache_mode: unique

  - case_id: image_text_961
    model: Qwen/Qwen3-VL-8B-Instruct
    payload:
      kind: image_text
      question: What do you see in this image?
      target_prompt_tokens: 961
      cache_mode: unique
      image_width: 1920
      image_height: 1080
